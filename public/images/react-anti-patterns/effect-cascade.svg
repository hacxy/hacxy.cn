<svg viewBox="0 0 620 280" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #1a1a1a; }
    .fg-sub { fill: #1a1a1a; opacity: 0.5; }
    .stroke { stroke: #1a1a1a; }
    .box { fill: rgba(0,0,0,0.06); stroke: rgba(0,0,0,0.15); }
    .box-bad { fill: rgba(220,38,38,0.08); stroke: rgba(220,38,38,0.3); }
    .box-good { fill: rgba(22,163,74,0.08); stroke: rgba(22,163,74,0.3); }
    .arrow-head { fill: #1a1a1a; }
    .red { fill: #dc2626; }
    .green { fill: #16a34a; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #e5e5e5; }
      .fg-sub { fill: #e5e5e5; opacity: 0.5; }
      .stroke { stroke: #e5e5e5; }
      .box { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.2); }
      .box-bad { fill: rgba(248,113,113,0.1); stroke: rgba(248,113,113,0.3); }
      .box-good { fill: rgba(74,222,128,0.1); stroke: rgba(74,222,128,0.3); }
      .arrow-head { fill: #e5e5e5; }
      .red { fill: #f87171; }
      .green { fill: #4ade80; }
    }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" class="arrow-head"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="310" y="24" text-anchor="middle" class="fg" font-size="15" font-weight="bold">useEffect 链式更新 vs 事件驱动</text>

  <!-- Bad pattern -->
  <text x="155" y="58" text-anchor="middle" class="red" font-size="13" font-weight="bold">反模式：Effect 瀑布流</text>
  <rect x="20" y="70" width="120" height="38" rx="8" class="box-bad" stroke-width="1.5"/>
  <text x="80" y="94" text-anchor="middle" class="fg" font-size="13">setState(a)</text>
  <line x1="140" y1="89" x2="168" y2="89" class="stroke" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="170" y="70" width="120" height="38" rx="8" class="box-bad" stroke-width="1.5"/>
  <text x="230" y="87" text-anchor="middle" class="fg" font-size="12">useEffect</text>
  <text x="230" y="101" text-anchor="middle" class="fg-sub" font-size="11">→ setState(b)</text>

  <line x1="230" y1="108" x2="230" y2="130" class="stroke" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="170" y="132" width="120" height="38" rx="8" class="box-bad" stroke-width="1.5"/>
  <text x="230" y="149" text-anchor="middle" class="fg" font-size="12">useEffect</text>
  <text x="230" y="163" text-anchor="middle" class="fg-sub" font-size="11">→ setState(c)</text>

  <line x1="230" y1="170" x2="230" y2="192" class="stroke" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="170" y="194" width="120" height="38" rx="8" class="box-bad" stroke-width="1.5"/>
  <text x="230" y="211" text-anchor="middle" class="fg" font-size="12">useEffect</text>
  <text x="230" y="225" text-anchor="middle" class="fg-sub" font-size="11">→ setState(d)</text>

  <text x="155" y="258" text-anchor="middle" class="red" font-size="12">4 次渲染</text>

  <!-- Good pattern -->
  <text x="465" y="58" text-anchor="middle" class="green" font-size="13" font-weight="bold">正确：事件处理器一次搞定</text>
  <rect x="370" y="70" width="190" height="100" rx="8" class="box-good" stroke-width="1.5"/>
  <text x="465" y="94" text-anchor="middle" class="fg" font-size="13" font-weight="bold">handleClick()</text>
  <text x="465" y="116" text-anchor="middle" class="fg" font-size="12">setState(a)</text>
  <text x="465" y="134" text-anchor="middle" class="fg" font-size="12">setState(b)</text>
  <text x="465" y="152" text-anchor="middle" class="fg" font-size="12">setState(c)</text>

  <line x1="465" y1="170" x2="465" y2="198" class="stroke" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="395" y="200" width="140" height="38" rx="8" class="box-good" stroke-width="1.5"/>
  <text x="465" y="224" text-anchor="middle" class="fg" font-size="13">渲染一次</text>

  <text x="465" y="258" text-anchor="middle" class="green" font-size="12">1 次渲染（自动批处理）</text>
</svg>
