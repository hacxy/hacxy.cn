<svg viewBox="0 0 520 220" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #1a1a1a; }
    .fg-sub { fill: #1a1a1a; opacity: 0.5; }
    .stroke { stroke: #1a1a1a; }
    .box1 { fill: rgba(0,0,0,0.10); stroke: rgba(0,0,0,0.15); }
    .box2 { fill: rgba(0,0,0,0.06); stroke: rgba(0,0,0,0.15); }
    .arrow-head { fill: #1a1a1a; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #e5e5e5; }
      .fg-sub { fill: #e5e5e5; opacity: 0.5; }
      .stroke { stroke: #e5e5e5; }
      .box1 { fill: rgba(255,255,255,0.12); stroke: rgba(255,255,255,0.2); }
      .box2 { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.2); }
      .arrow-head { fill: #e5e5e5; }
    }
  </style>
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head"/>
    </marker>
  </defs>
  <rect x="160" y="10" width="200" height="55" rx="10" class="box1" stroke-width="1.5"/>
  <text x="260" y="32" text-anchor="middle" class="fg" font-size="14" font-weight="bold">主 Agent</text>
  <text x="260" y="50" text-anchor="middle" class="fg-sub" font-size="12">接收任务、分配、汇总</text>
  <rect x="30" y="130" width="200" height="55" rx="10" class="box2" stroke-width="1.5"/>
  <text x="130" y="152" text-anchor="middle" class="fg" font-size="13" font-weight="bold">code-reviewer</text>
  <text x="130" y="170" text-anchor="middle" class="fg-sub" font-size="11">代码质量审查</text>
  <rect x="290" y="130" width="200" height="55" rx="10" class="box2" stroke-width="1.5"/>
  <text x="390" y="152" text-anchor="middle" class="fg" font-size="13" font-weight="bold">security-scanner</text>
  <text x="390" y="170" text-anchor="middle" class="fg-sub" font-size="11">安全漏洞扫描</text>
  <line x1="210" y1="65" x2="150" y2="130" class="stroke" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="310" y1="65" x2="370" y2="130" class="stroke" stroke-width="1.5" marker-end="url(#arr3)"/>
</svg>
