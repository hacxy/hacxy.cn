<svg viewBox="0 0 520 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #1a1a1a; }
    .fg-sub { fill: #1a1a1a; opacity: 0.5; }
    .stroke { stroke: #1a1a1a; }
    .box1 { fill: rgba(0,0,0,0.06); stroke: rgba(0,0,0,0.15); }
    .box2 { fill: rgba(0,0,0,0.10); stroke: rgba(0,0,0,0.15); }
    .box3 { fill: rgba(0,0,0,0.04); stroke: rgba(0,0,0,0.15); }
    .arrow-head { fill: #1a1a1a; }
    .loop-line { stroke: #1a1a1a; fill: none; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #e5e5e5; }
      .fg-sub { fill: #e5e5e5; opacity: 0.5; }
      .stroke { stroke: #e5e5e5; }
      .box1 { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.2); }
      .box2 { fill: rgba(255,255,255,0.12); stroke: rgba(255,255,255,0.2); }
      .box3 { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.2); }
      .arrow-head { fill: #e5e5e5; }
      .loop-line { stroke: #e5e5e5; }
    }
  </style>
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head"/>
    </marker>
  </defs>
  <rect x="10" y="70" width="120" height="60" rx="8" class="box1" stroke-width="1.5"/>
  <text x="70" y="95" text-anchor="middle" class="fg" font-size="13" font-weight="bold">SystemMessage</text>
  <text x="70" y="115" text-anchor="middle" class="fg-sub" font-size="11">session 初始化</text>
  <rect x="190" y="70" width="140" height="60" rx="8" class="box2" stroke-width="1.5"/>
  <text x="260" y="95" text-anchor="middle" class="fg" font-size="13" font-weight="bold">AssistantMessage</text>
  <text x="260" y="115" text-anchor="middle" class="fg-sub" font-size="11">推理 + 工具调用</text>
  <rect x="390" y="70" width="120" height="60" rx="8" class="box3" stroke-width="1.5"/>
  <text x="450" y="95" text-anchor="middle" class="fg" font-size="13" font-weight="bold">ResultMessage</text>
  <text x="450" y="115" text-anchor="middle" class="fg-sub" font-size="11">最终结果</text>
  <line x1="130" y1="100" x2="190" y2="100" class="stroke" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="330" y1="100" x2="390" y2="100" class="stroke" stroke-width="1.5" marker-end="url(#arr2)"/>
  <path d="M 285 130 C 295 175 165 175 190 105" class="loop-line" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="245" y="185" text-anchor="middle" class="fg-sub" font-size="11">可能多次循环</text>
</svg>
